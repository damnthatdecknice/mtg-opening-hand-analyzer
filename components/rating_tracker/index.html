<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: rgba(3, 8, 17, 0.92);
        --panel: rgba(8, 17, 31, 0.94);
        --panel-strong: rgba(11, 23, 42, 0.96);
        --border: rgba(128, 205, 255, 0.28);
        --text: #f4f9ff;
        --muted: #adc3dd;
        --cyan: #65d8ff;
        --green: #7de0b1;
        --red: #ff7464;
        --gold: #e2c174;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: transparent;
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
      }
      .shell {
        background: linear-gradient(135deg, var(--panel), rgba(4, 10, 20, 0.9));
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
      }
      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: minmax(280px, 0.9fr) minmax(320px, 1.1fr);
      }
      .card {
        background: var(--bg);
        border: 1px solid rgba(128, 205, 255, 0.18);
        border-radius: 10px;
        padding: 14px;
      }
      .kicker {
        color: var(--gold);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.12em;
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      .metric-row {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, 1fr);
        margin-bottom: 14px;
      }
      .metric {
        background: var(--panel-strong);
        border: 1px solid rgba(128, 205, 255, 0.18);
        border-radius: 9px;
        padding: 12px;
      }
      .metric-label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }
      .metric-value {
        font-size: 26px;
        font-weight: 950;
        margin-top: 3px;
      }
      .positive {
        color: var(--green);
      }
      .negative {
        color: var(--red);
      }
      label {
        color: var(--muted);
        display: block;
        font-size: 13px;
        font-weight: 800;
        margin: 10px 0 5px;
      }
      input,
      select,
      textarea {
        background: rgba(2, 7, 17, 0.98);
        border: 1px solid rgba(128, 205, 255, 0.28);
        border-radius: 7px;
        color: var(--text);
        font: inherit;
        padding: 9px 10px;
        width: 100%;
      }
      textarea {
        min-height: 72px;
        resize: vertical;
      }
      .form-row {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr;
      }
      button {
        background: linear-gradient(135deg, rgba(32, 115, 178, 0.94), rgba(23, 34, 74, 0.94));
        border: 1px solid rgba(101, 216, 255, 0.58);
        border-radius: 7px;
        color: var(--text);
        cursor: pointer;
        font-weight: 900;
        padding: 10px 12px;
      }
      button:hover {
        border-color: var(--gold);
      }
      button.secondary {
        background: rgba(16, 25, 39, 0.94);
        color: var(--muted);
      }
      button.danger {
        border-color: rgba(255, 116, 100, 0.45);
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      .actions button {
        flex: 1;
      }
      .chart {
        background: rgba(2, 7, 17, 0.78);
        border: 1px solid rgba(128, 205, 255, 0.16);
        border-radius: 9px;
        min-height: 240px;
        padding: 8px;
      }
      svg {
        display: block;
        height: 240px;
        width: 100%;
      }
      table {
        border-collapse: collapse;
        margin-top: 12px;
        width: 100%;
      }
      th,
      td {
        border-bottom: 1px solid rgba(128, 205, 255, 0.14);
        font-size: 13px;
        padding: 9px 7px;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }
      .empty {
        color: var(--muted);
        padding: 28px;
        text-align: center;
      }
      .tiny {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        margin-top: 8px;
      }
      @media (max-width: 820px) {
        .grid,
        .metric-row,
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="metric-row">
        <div class="metric">
          <div class="metric-label">Current Rating</div>
          <div id="current" class="metric-value">-</div>
        </div>
        <div class="metric">
          <div class="metric-label">Total Change</div>
          <div id="change" class="metric-value">-</div>
        </div>
        <div class="metric">
          <div class="metric-label">Entries</div>
          <div id="entries" class="metric-value">0</div>
        </div>
      </div>
      <div class="grid">
        <div class="card">
          <div class="kicker">Add rating entry</div>
          <div class="form-row">
            <div>
              <label for="rating">Rating</label>
              <input id="rating" type="number" inputmode="numeric" placeholder="e.g. 1425" />
            </div>
            <div>
              <label for="result">Result</label>
              <select id="result">
                <option value="After session">After session</option>
                <option value="Win">Win</option>
                <option value="Loss">Loss</option>
                <option value="Draw">Draw</option>
                <option value="Event finish">Event finish</option>
              </select>
            </div>
          </div>
          <label for="note">Note</label>
          <textarea id="note" placeholder="Optional: deck, matchup, event, or session note"></textarea>
          <div class="actions">
            <button id="add" type="button">Add Entry</button>
            <button id="undo" class="secondary" type="button">Undo Last</button>
            <button id="clear" class="secondary danger" type="button">Clear</button>
          </div>
          <div class="tiny">Saved locally in this browser using localStorage. It will not follow you to another browser or device.</div>
        </div>
        <div class="card">
          <div class="kicker">Rating trend</div>
          <div id="chart" class="chart"></div>
        </div>
      </div>
      <div class="card" style="margin-top: 14px">
        <div class="kicker">History</div>
        <div id="history"></div>
      </div>
    </div>
    <script>
      const STORAGE_KEY = "mtg-opening-hand-rating-history-v1";
      const Streamlit = {
        setComponentReady() {
          window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
        },
        setComponentValue(value) {
          window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setComponentValue", value, dataType: "json" }, "*");
        },
        setFrameHeight(height) {
          window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height }, "*");
        },
      };

      const rating = document.getElementById("rating");
      const result = document.getElementById("result");
      const note = document.getElementById("note");
      const current = document.getElementById("current");
      const change = document.getElementById("change");
      const entries = document.getElementById("entries");
      const chart = document.getElementById("chart");
      const historyNode = document.getElementById("history");

      function loadHistory() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveHistory(history) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        Streamlit.setComponentValue({ timestamp: Date.now(), entries: history.length });
      }

      function fmtChange(value) {
        if (!Number.isFinite(value)) return "-";
        if (value > 0) return `+${value}`;
        return String(value);
      }

      function drawChart(history) {
        if (history.length < 2) {
          chart.innerHTML = '<div class="empty">Add at least two entries to see a trend.</div>';
          return;
        }
        const values = history.map((entry) => Number(entry.rating));
        const min = Math.min(...values);
        const max = Math.max(...values);
        const pad = Math.max(20, Math.round((max - min) * 0.12));
        const lo = min - pad;
        const hi = max + pad;
        const w = 760;
        const h = 240;
        const points = values.map((value, index) => {
          const x = 36 + (index * (w - 72)) / Math.max(1, values.length - 1);
          const y = h - 34 - ((value - lo) * (h - 68)) / Math.max(1, hi - lo);
          return [x, y];
        });
        const polyline = points.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
        const circles = points
          .map(([x, y], index) => `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4"><title>${history[index].rating}</title></circle>`)
          .join("");
        chart.innerHTML = `
          <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img" aria-label="Rating trend">
            <line x1="36" y1="${h - 34}" x2="${w - 36}" y2="${h - 34}" stroke="rgba(173,195,221,0.28)" />
            <line x1="36" y1="26" x2="36" y2="${h - 34}" stroke="rgba(173,195,221,0.28)" />
            <text x="40" y="22" fill="#adc3dd" font-size="12">${hi}</text>
            <text x="40" y="${h - 12}" fill="#adc3dd" font-size="12">${lo}</text>
            <polyline points="${polyline}" fill="none" stroke="#65d8ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
            <g fill="#7de0b1" stroke="#030711" stroke-width="2">${circles}</g>
          </svg>
        `;
      }

      function render() {
        const history = loadHistory();
        entries.textContent = String(history.length);
        if (!history.length) {
          current.textContent = "-";
          change.textContent = "-";
          change.className = "metric-value";
          drawChart(history);
          historyNode.innerHTML = '<div class="empty">No rating entries yet.</div>';
          Streamlit.setFrameHeight(document.body.scrollHeight + 20);
          return;
        }
        const first = Number(history[0].rating);
        const last = Number(history[history.length - 1].rating);
        const delta = last - first;
        current.textContent = String(last);
        change.textContent = fmtChange(delta);
        change.className = `metric-value ${delta > 0 ? "positive" : delta < 0 ? "negative" : ""}`;
        rating.value = String(last);
        drawChart(history);
        const rows = history
          .slice()
          .reverse()
          .map((entry) => {
            const date = new Date(entry.timestamp).toLocaleString();
            return `<tr><td>${date}</td><td>${entry.rating}</td><td>${entry.result}</td><td>${entry.note || ""}</td></tr>`;
          })
          .join("");
        historyNode.innerHTML = `
          <table>
            <thead><tr><th>Date</th><th>Rating</th><th>Result</th><th>Note</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
        Streamlit.setFrameHeight(document.body.scrollHeight + 20);
      }

      document.getElementById("add").addEventListener("click", () => {
        const value = Number(rating.value);
        if (!Number.isFinite(value)) {
          rating.focus();
          return;
        }
        const history = loadHistory();
        history.push({
          timestamp: new Date().toISOString(),
          rating: Math.round(value),
          result: result.value,
          note: note.value.trim(),
        });
        saveHistory(history);
        note.value = "";
        render();
      });

      document.getElementById("undo").addEventListener("click", () => {
        const history = loadHistory();
        history.pop();
        saveHistory(history);
        render();
      });

      document.getElementById("clear").addEventListener("click", () => {
        if (!confirm("Clear all rating history from this browser?")) return;
        saveHistory([]);
        render();
      });

      window.addEventListener("load", () => {
        Streamlit.setComponentReady();
        render();
      });
    </script>
  </body>
</html>
