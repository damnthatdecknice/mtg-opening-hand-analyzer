<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        color: #f5f7fb;
        font-family: sans-serif;
        margin: 0;
      }
      #status {
        color: #b8c7d9;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <span id="status">Reading crop titles as an extra check...</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
      const Streamlit = {
        setComponentReady() {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
            "*"
          );
        },
        setComponentValue(value) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setComponentValue", value, dataType: "json" },
            "*"
          );
        },
        setFrameHeight(height) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height },
            "*"
          );
        },
      };

      const status = document.getElementById("status");
      let crops = [];
      let ocrMode = "title";
      let lastCropSignature = "";
      let isRunning = false;

      function setHeight() {
        Streamlit.setFrameHeight(54);
      }

      function setStatus(text) {
        status.textContent = text;
        setHeight();
      }

      function cleanText(text) {
        return (text || "")
          .replace(/[^A-Za-z0-9 '\-,/]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function loadImage(dataUrl) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = dataUrl;
        });
      }

      async function titleStripDataUrl(dataUrl) {
        const image = await loadImage(dataUrl);
        const stripHeight = ocrMode === "full" ? image.height : Math.max(18, Math.round(image.height * 0.17));
        const canvas = document.createElement("canvas");
        const scale = ocrMode === "full" ? 4 : 5;
        canvas.width = image.width * scale;
        canvas.height = stripHeight * scale;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(image, 0, 0, image.width, stripHeight, 0, 0, canvas.width, canvas.height);
        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let index = 0; index < pixels.data.length; index += 4) {
          const gray = pixels.data[index] * 0.299 + pixels.data[index + 1] * 0.587 + pixels.data[index + 2] * 0.114;
          const boosted = gray > 145 ? 255 : gray < 80 ? 0 : gray;
          pixels.data[index] = boosted;
          pixels.data[index + 1] = boosted;
          pixels.data[index + 2] = boosted;
        }
        ctx.putImageData(pixels, 0, 0);
        return canvas.toDataURL("image/png");
      }

      async function runOcr() {
        if (isRunning) {
          return;
        }
        if (!window.Tesseract) {
          setStatus("OCR library did not load. The image matcher still works.");
          return;
        }
        if (!crops.length) {
          setStatus("No crops are available yet.");
          return;
        }
        isRunning = true;
        const results = [];
        try {
          for (let index = 0; index < crops.length; index += 1) {
            const crop = crops[index];
            setStatus(`Reading crop ${index + 1} of ${crops.length}...`);
            const strip = await titleStripDataUrl(crop.dataUrl);
            const response = await Tesseract.recognize(strip, "eng");
            const text = cleanText(response?.data?.text || "");
            const confidence = Number(response?.data?.confidence || 0);
            results.push({ id: crop.id, text, confidence });
          }
          Streamlit.setComponentValue({ timestamp: Date.now(), results });
          setStatus("Crop title check complete.");
        } catch (error) {
          setStatus("OCR could not read these crops. You can still use the matcher and dropdowns.");
        } finally {
          isRunning = false;
          setHeight();
        }
      }

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type !== "streamlit:render") {
          return;
        }
        crops = Array.isArray(data.args?.crops) ? data.args.crops : [];
        ocrMode = data.args?.mode === "full" ? "full" : "title";
        const cropSignature = `${ocrMode}:` + crops.map((crop) => `${crop.id}:${crop.dataUrl?.length || 0}`).join("|");
        setHeight();
        if (crops.length && cropSignature !== lastCropSignature) {
          lastCropSignature = cropSignature;
          window.setTimeout(runOcr, 50);
        }
      });

      window.addEventListener("load", () => {
        Streamlit.setComponentReady();
        setHeight();
      });
    </script>
  </body>
</html>
