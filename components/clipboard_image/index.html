<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      #paste-zone {
        align-items: center;
        border: 1px dashed #6da9df;
        border-radius: 8px;
        color: #f5f7fb;
        display: flex;
        flex-direction: column;
        gap: 8px;
        justify-content: center;
        min-height: 118px;
        outline: none;
        padding: 16px;
        text-align: center;
      }
      #capture-zone {
        border: 1px solid rgba(109, 169, 223, 0.55);
        border-radius: 8px;
        color: #f5f7fb;
        margin-top: 10px;
        padding: 12px 14px;
      }
      #paste-zone:focus,
      #paste-zone.dragging {
        border-color: #4aa3ff;
        box-shadow: 0 0 0 2px rgba(74, 163, 255, 0.25);
      }
      #file-input {
        display: none;
      }
      #paste-button,
      #choose-button,
      #capture-button {
        background: #243447;
        border: 1px solid #6da9df;
        border-radius: 6px;
        color: #f5f7fb;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        padding: 8px 12px;
      }
      #paste-button:focus,
      #choose-button:focus,
      #capture-button:focus {
        outline: 2px solid rgba(74, 163, 255, 0.5);
        outline-offset: 2px;
      }
      #capture-button {
        background: linear-gradient(135deg, #2073b2, #17224a);
        margin-bottom: 6px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
      .primary {
        font-size: 15px;
        font-weight: 700;
      }
      .secondary {
        color: #b8c7d9;
        font-size: 13px;
      }
      .capture-copy {
        color: #b8c7d9;
        font-size: 12px;
        line-height: 1.35;
      }
      #status {
        color: #b8c7d9;
        font-size: 13px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="paste-zone" tabindex="0">
      <div class="primary">Add a screenshot from your clipboard</div>
      <div class="actions">
        <button id="paste-button" type="button">Paste Clipboard</button>
        <button id="choose-button" type="button">Choose Image</button>
      </div>
      <div class="secondary">You can also click this box and press Ctrl+V, or drag/drop an image here.</div>
    </div>
    <div id="capture-zone">
      <button id="capture-button" type="button">Capture MTGO Window</button>
      <div class="capture-copy">
        Your browser will ask what to share. Choose the MTGO match window; this captures one still frame and stops sharing.
      </div>
    </div>
    <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
    <div id="status">No pasted screenshot yet.</div>
    <script>
      const Streamlit = {
        setComponentReady() {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:componentReady",
              apiVersion: 1,
            },
            "*"
          );
        },
        setComponentValue(value) {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:setComponentValue",
              value,
              dataType: "json",
            },
            "*"
          );
        },
        setFrameHeight(height) {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type: "streamlit:setFrameHeight",
              height,
            },
            "*"
          );
        },
      };

      const zone = document.getElementById("paste-zone");
      const status = document.getElementById("status");
      const fileInput = document.getElementById("file-input");
      const pasteButton = document.getElementById("paste-button");
      const chooseButton = document.getElementById("choose-button");
      const captureButton = document.getElementById("capture-button");
      const COMPONENT_HEIGHT = 265;

      function sendHeight() {
        Streamlit.setFrameHeight(COMPONENT_HEIGHT);
      }

      function announceReady() {
        Streamlit.setComponentReady();
        sendHeight();
      }

      function setStatus(message) {
        status.textContent = message;
        sendHeight();
      }

      function sendFile(file, source) {
        if (!file || !file.type.startsWith("image/")) {
          setStatus("That was not an image. Try a screenshot, PNG, JPG, or WEBP.");
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          setStatus(`Screenshot ${source}. Processing in the app...`);
          Streamlit.setComponentValue({
            dataUrl: reader.result,
            name: file.name || "pasted-screenshot.png",
            type: file.type || "image/png",
            timestamp: Date.now(),
            source,
          });
        };
        reader.onerror = () => setStatus("The browser could not read that image.");
        reader.readAsDataURL(file);
      }

      async function pasteFromClipboard() {
        if (!navigator.clipboard?.read) {
          setStatus("This browser does not allow clipboard images from a button. Try Ctrl+V or Upload.");
          return;
        }
        try {
          const items = await navigator.clipboard.read();
          for (const item of items) {
            const imageType = item.types.find((type) => type.startsWith("image/"));
            if (imageType) {
              const blob = await item.getType(imageType);
              const extension = imageType.split("/")[1] || "png";
              const file = new File([blob], `clipboard-screenshot.${extension}`, { type: imageType });
              sendFile(file, "pasted");
              return;
            }
          }
          setStatus("Clipboard did not contain an image.");
        } catch (error) {
          setStatus("The browser blocked clipboard access. Click the box and press Ctrl+V, or use Upload.");
        }
      }

      async function captureSharedWindow() {
        if (!navigator.mediaDevices?.getDisplayMedia) {
          setStatus("This browser does not support window capture. Try Chrome or Edge, or use Paste/Upload.");
          return;
        }
        let stream;
        try {
          setStatus("Choose the MTGO match window in the browser prompt.");
          stream = await navigator.mediaDevices.getDisplayMedia({
            video: {
              displaySurface: "window",
            },
            audio: false,
            preferCurrentTab: false,
            selfBrowserSurface: "exclude",
            systemAudio: "exclude",
          });
          const video = document.createElement("video");
          video.muted = true;
          video.playsInline = true;
          video.srcObject = stream;
          await new Promise((resolve, reject) => {
            video.onloadedmetadata = resolve;
            video.onerror = reject;
          });
          await video.play();
          await new Promise((resolve) => requestAnimationFrame(resolve));

          const track = stream.getVideoTracks()[0];
          const settings = track?.getSettings?.() || {};
          const width = video.videoWidth || settings.width || 1280;
          const height = video.videoHeight || settings.height || 720;
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const context = canvas.getContext("2d");
          context.drawImage(video, 0, 0, width, height);
          stream.getTracks().forEach((candidate) => candidate.stop());
          canvas.toBlob((blob) => {
            if (!blob) {
              setStatus("The browser could not capture an image from that window.");
              return;
            }
            const file = new File([blob], "mtgo-window-capture.png", { type: "image/png" });
            sendFile(file, "captured");
          }, "image/png");
        } catch (error) {
          if (stream) {
            stream.getTracks().forEach((candidate) => candidate.stop());
          }
          setStatus("Window capture was cancelled or blocked by the browser.");
        }
      }

      function handlePaste(event) {
        const items = Array.from(event.clipboardData?.items || []);
        const imageItem = items.find((item) => item.type.startsWith("image/"));
        if (!imageItem) {
          setStatus("Clipboard did not contain an image.");
          return;
        }
        event.preventDefault();
        sendFile(imageItem.getAsFile(), "pasted");
      }

      window.addEventListener("load", () => {
        zone.focus();
        announceReady();
        window.requestAnimationFrame(announceReady);
        window.setTimeout(announceReady, 100);
        window.setTimeout(announceReady, 500);
        window.setTimeout(announceReady, 1000);
        window.setTimeout(announceReady, 2000);
        window.setTimeout(announceReady, 4000);
      });

      zone.addEventListener("click", () => {
        zone.focus();
      });

      zone.addEventListener("dblclick", () => {
        fileInput.click();
      });

      pasteButton.addEventListener("click", (event) => {
        event.stopPropagation();
        pasteFromClipboard();
      });

      chooseButton.addEventListener("click", (event) => {
        event.stopPropagation();
        fileInput.click();
      });

      captureButton.addEventListener("click", (event) => {
        event.stopPropagation();
        captureSharedWindow();
      });

      document.addEventListener("paste", handlePaste);
      window.addEventListener("paste", handlePaste);

      zone.addEventListener("dragover", (event) => {
        event.preventDefault();
        zone.classList.add("dragging");
      });

      zone.addEventListener("dragleave", () => {
        zone.classList.remove("dragging");
      });

      zone.addEventListener("drop", (event) => {
        event.preventDefault();
        zone.classList.remove("dragging");
        const file = Array.from(event.dataTransfer?.files || []).find((candidate) =>
          candidate.type.startsWith("image/")
        );
        sendFile(file, "dropped");
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files?.[0];
        if (file) {
          sendFile(file, "selected");
        }
      });
    </script>
  </body>
</html>
